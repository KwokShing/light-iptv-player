name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Resolve build name
        id: bn
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "name=0.0.0-dev" >> "$GITHUB_OUTPUT"
          fi

      - run: flutter build windows --release --build-name=${{ steps.bn.outputs.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-iptv-player-windows-x64
          path: build/windows/x64/runner/Release/

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: light-iptv-player-windows-x64
          path: release-files

      - name: Zip for release
        run: cd release-files && zip -r ../light-iptv-player-windows-x64.zip .

      - name: Determine release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=dev-$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "name=Dev build ${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          files: light-iptv-player-windows-x64.zip
          generate_release_notes: true
