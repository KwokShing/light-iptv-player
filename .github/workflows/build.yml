name: Build and Release

# Triggers on every push and on manual runs from the Actions tab.
on:
  push:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      relname: ${{ steps.meta.outputs.relname }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Determine release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "buildname=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "relname=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            TAG="dev-$(date -u +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "buildname=0.0.0-dev" >> "$GITHUB_OUTPUT"
            echo "relname=Dev build $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows
        run: >
          flutter build windows --release
          --build-name=${{ steps.meta.outputs.buildname }}
          --dart-define=RELEASE_TAG=${{ steps.meta.outputs.tag }}

      - name: Verify AV3A decoder runtime
        shell: pwsh
        run: |
          $ffmpeg = 'build/windows/x64/runner/Release/av3a_ffmpeg/ffmpeg.exe'
          if (-not (Test-Path $ffmpeg)) {
            throw 'AV3A FFmpeg runtime was not packaged'
          }
          $decoders = & $ffmpeg -hide_banner -decoders 2>&1 | Out-String
          if ($decoders -notmatch 'libarcdav3a') {
            throw 'Packaged FFmpeg does not contain the AV3A decoder'
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-iptv-player-windows-x64
          path: build/windows/x64/runner/Release/

  release:
    # Publish a release for version tags, pushes to main (dev pre-releases),
    # and manual runs. Other branch pushes only build the artifact above.
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch'
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: light-iptv-player-windows-x64
          path: release-files

      - name: Zip for release
        run: cd release-files && zip -r ../light-iptv-player-windows-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-windows.outputs.tag }}
          name: ${{ needs.build-windows.outputs.relname }}
          prerelease: ${{ needs.build-windows.outputs.prerelease }}
          files: light-iptv-player-windows-x64.zip
          generate_release_notes: true
